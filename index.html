<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디즈니 MBTI 테스트 ✨</title>

  <!-- Google Fonts: 제목용(Playfair Display) + 본문용(Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- 스타일시트 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== 별 파티클 배경 ========== -->
  <div class="stars-bg" id="starsBg"></div>

  <!-- ========== 메인 앱 컨테이너 ========== -->
  <div class="app" id="app">

    <!-- ──────────────────────────────────
         화면 1: 시작 화면
    ────────────────────────────────── -->
    <section class="screen" id="screenStart">
      <div class="start-inner">
        <!-- 상단 장식 아이콘 -->
        <div class="magic-icon">🏰</div>

        <!-- 타이틀 -->
        <h1 class="title">
          <span class="title-sub">당신의 성격 유형을 찾아드립니다</span>
          디즈니<br/>MBTI 테스트
        </h1>

        <!-- 소개 설명 -->
        <p class="intro-text">
          12가지 질문에 답하고<br/>
          당신과 꼭 닮은 디즈니 캐릭터를 만나보세요 ✨
        </p>

        <!-- 시작 버튼 -->
        <button class="btn-start" id="btnStart">
          테스트 시작하기
          <span class="btn-arrow">→</span>
        </button>

        <!-- 하단 장식 -->
        <p class="start-footer">총 12문항 · 약 3분 소요</p>
      </div>
    </section>

    <!-- ──────────────────────────────────
         화면 2: 질문 화면
    ────────────────────────────────── -->
    <section class="screen hidden" id="screenQuestion">
      <!-- 진행률 바 -->
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- 질문 번호 표시 -->
      <p class="question-counter" id="questionCounter">1 / 12</p>

      <!-- 질문 카드 -->
      <div class="question-card" id="questionCard">
        <p class="question-text" id="questionText">질문이 여기에 표시됩니다</p>

        <!-- 선택지 버튼들 -->
        <div class="options-wrap" id="optionsWrap">
          <!-- JavaScript가 동적으로 생성합니다 -->
        </div>
      </div>
    </section>

    <!-- ──────────────────────────────────
         화면 3: 결과 화면
    ────────────────────────────────── -->
    <section class="screen hidden" id="screenResult">
      <!-- 헤더 -->
      <div class="result-header">
        <p class="result-label">당신의 유형은</p>
        <h2 class="result-mbti" id="resultMbti">ENFP</h2>
      </div>

      <!-- 캐릭터 카드 -->
      <div class="result-card">
        <!-- 캐릭터 이미지 -->
        <div class="character-img-wrap">
          <img class="character-img" id="resultImg" src="" alt="디즈니 캐릭터" />
          <div class="img-glow"></div>
        </div>

        <!-- 캐릭터 정보 -->
        <div class="character-info">
          <p class="char-label">당신과 닮은 캐릭터</p>
          <h3 class="char-name" id="resultCharacter">라푼젤</h3>
          <p class="char-desc" id="resultDescription">자유롭고 열정적인 탐험가</p>
          <p class="char-detail" id="resultDetail">호기심 많고 긍정적인 에너지를 주변에 전파함</p>
        </div>
      </div>

      <!-- 다시하기 버튼 -->
      <button class="btn-restart" id="btnRestart">
        🔄 다시 테스트하기
      </button>
    </section>

  </div><!-- /.app -->

  <!-- JavaScript 연결 -->
  <script src="script.js"></script>
</body>
</html>
